<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="public/styles/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sayma</title>
  </head>
  <body>
    <main>
      <div class="container contact-form-page">
        <form class="contactUsForm" id="contractForm">
          <div class="first-two flex items-center justify-between gap-x-2">
            <input
              class="w-full"
              required
              placeholder="الطرف الثاني"
              type="text"
              name="naam"
            />
            <input
              class="w-full"
              required
              placeholder="الرقم المدني"
              type="number"
              name="raqam"
            />
          </div>
          <input
            class="block w-full"
            required
            placeholder="الرقم الماذونية"
            type="text"
            name="madvia"
          />
          <input
            class="block w-full"
            required
            placeholder="العنوان المحافظة"
            type="text"
            name="hafza"
          />
          <input
            class="block w-full"
            required
            placeholder="ولاية"
            type="text"
            name="walid"
          />
          <input
            class="block w-full"
            required
            placeholder="رقم الهاتف"
            type="number"
            name="hatif"
          />
          <input
            class="block w-full"
            required
            placeholder="يوم الاحد بتاريخ"
            type="date"
            name="date"
          />
          <input
            class="block w-full"
            required
            placeholder="قيمه الاستقدام"
            type="number"
            name="mastaqdam"
          />
          <input
            class="block w-full"
            required
            placeholder="والعاملة تدعي"
            type="text"
            name="aamil"
          />
          <input
            class="block w-full"
            required
            placeholder="رقم الجواز"
            type="text"
            name="khaldal"
          />
          <input
            class="block w-full"
            required
            placeholder="الجنسية"
            type="text"
            name="jins"
          />
          <input
            class="block w-full"
            required
            placeholder="شهري وقدره"
            type="number"
            name="yadfa"
          />
          <button
            type="submit"
            class="bg-blue-900 text-white px-4 py-2 mt-4 rounded-lg font-medium hover:bg-blue-800"
          >
            Download as pdf
          </button>
        </form>
      </div>
    </main>

    <script>
      document.getElementById('contractForm').addEventListener('submit', function (e) {
        e.preventDefault();
        const data = {
          naam:      document.querySelector('[name="naam"]').value,
          raqam:     document.querySelector('[name="raqam"]').value,
          madvia:    document.querySelector('[name="madvia"]').value,
          hafza:     document.querySelector('[name="hafza"]').value,
          walid:     document.querySelector('[name="walid"]').value,
          hatif:     document.querySelector('[name="hatif"]').value,
          date:      document.querySelector('[name="date"]').value,
          mastaqdam: document.querySelector('[name="mastaqdam"]').value,
          aamil:     document.querySelector('[name="aamil"]').value,
          khaldal:   document.querySelector('[name="khaldal"]').value,
          jins:      document.querySelector('[name="jins"]').value,
          yadfa:     document.querySelector('[name="yadfa"]').value,
        };
        sessionStorage.setItem('contractData', JSON.stringify(data));
        window.location.href = '/contract.html';
      });
    </script>
  </body>
</html>
